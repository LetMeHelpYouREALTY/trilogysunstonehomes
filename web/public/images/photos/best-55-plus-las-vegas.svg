<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800" role="img" aria-labelledby="title desc">
  <title id="title">Stylized Las Vegas 55+ community comparison illustration</title>
  <desc id="desc">
    Abstract Las Vegas valley map with highlighted 55+ communities and comparison cards. Intended as a placeholder for
    a hero image on the Best 55+ Communities Las Vegas guide.
  </desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e" />
      <stop offset="100%" stop-color="#a3e635" />
    </linearGradient>
  </defs>

  <rect width="1400" height="800" fill="url(#bg)" />

  <!-- Subtle grid -->
  <g stroke="#111827" stroke-width="1">
    <line x1="200" y1="80" x2="200" y2="720" />
    <line x1="400" y1="80" x2="400" y2="720" />
    <line x1="600" y1="80" x2="600" y2="720" />
    <line x1="800" y1="80" x2="800" y2="720" />
    <line x1="1000" y1="80" x2="1000" y2="720" />
    <line x1="120" y1="180" x2="1280" y2="180" />
    <line x1="120" y1="340" x2="1280" y2="340" />
    <line x1="120" y1="500" x2="1280" y2="500" />
    <line x1="120" y1="660" x2="1280" y2="660" />
  </g>

  <!-- Map blob -->
  <path
    d="M260 240 C420 120 720 120 960 210 C1120 270 1240 360 1180 470 C1120 580 920 660 720 690 C520 720 320 690 220 610 C140 548 140 420 260 240 Z"
    fill="#020617"
  />
  <path
    d="M300 260 C440 160 700 160 920 240 C1080 300 1180 380 1140 460 C1100 540 930 610 740 640 C550 670 380 650 280 590 C210 548 212 440 300 260 Z"
    fill="#111827"
  />

  <!-- Highlighted communities -->
  <g>
    <circle cx="520" cy="320" r="12" fill="#22c55e" />
    <circle cx="780" cy="310" r="12" fill="#22c55e" />
    <circle cx="640" cy="420" r="12" fill="#22c55e" />
    <circle cx="880" cy="420" r="10" fill="#38bdf8" />
    <circle cx="440" cy="430" r="10" fill="#f97316" />
  </g>

  <!-- Connection lines -->
  <g stroke="#22c55e" stroke-width="3" opacity="0.7">
    <line x1="520" y1="320" x2="640" y2="420" />
    <line x1="780" y1="310" x2="640" y2="420" />
    <line x1="880" y1="420" x2="640" y2="420" />
    <line x1="440" y1="430" x2="640" y2="420" />
  </g>

  <!-- Comparison cards -->
  <g transform="translate(170, 520)">
    <rect x="0" y="0" width="320" height="170" rx="20" fill="#020617" />
    <rect x="12" y="12" width="296" height="146" rx="18" fill="#0b1120" />
    <rect x="12" y="12" width="120" height="6" rx="3" fill="url(#accent)" />
    <rect x="32" y="48" width="120" height="16" rx="8" fill="#e5e7eb" opacity="0.85" />
    <rect x="32" y="80" width="180" height="10" rx="5" fill="#9ca3af" />
    <rect x="32" y="104" width="140" height="10" rx="5" fill="#6b7280" />
  </g>

  <g transform="translate(540, 540)">
    <rect x="0" y="0" width="320" height="170" rx="20" fill="#020617" />
    <rect x="12" y="12" width="296" height="146" rx="18" fill="#0b1120" />
    <rect x="12" y="12" width="140" height="6" rx="3" fill="#38bdf8" />
    <rect x="32" y="48" width="150" height="16" rx="8" fill="#e5e7eb" opacity="0.85" />
    <rect x="32" y="80" width="190" height="10" rx="5" fill="#9ca3af" />
    <rect x="32" y="104" width="150" height="10" rx="5" fill="#6b7280" />
  </g>

  <g transform="translate(910, 520)">
    <rect x="0" y="0" width="320" height="170" rx="20" fill="#020617" />
    <rect x="12" y="12" width="296" height="146" rx="18" fill="#0b1120" />
    <rect x="12" y="12" width="180" height="6" rx="3" fill="#f97316" />
    <rect x="32" y="48" width="120" height="16" rx="8" fill="#e5e7eb" opacity="0.85" />
    <rect x="32" y="80" width="170" height="10" rx="5" fill="#9ca3af" />
    <rect x="32" y="104" width="130" height="10" rx="5" fill="#6b7280" />
  </g>
</svg>

