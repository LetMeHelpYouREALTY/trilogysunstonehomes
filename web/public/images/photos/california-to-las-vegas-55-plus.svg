<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800" role="img" aria-labelledby="title desc">
  <title id="title">Stylized illustration of moving from California to Las Vegas 55+ community</title>
  <desc id="desc">
    Abstract desert highway leading from a California coastline to Las Vegas skyline and a 55+ community icon. Intended
    as a placeholder hero image for the California to Las Vegas 55+ relocation guide.
  </desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="40%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
  </defs>

  <rect width="1400" height="800" fill="url(#sky)" />

  <!-- Sun -->
  <circle cx="1040" cy="190" r="110" fill="#f97316" opacity="0.9" />

  <!-- Mountains -->
  <path
    d="M0 420 L180 260 L380 320 L560 260 L760 320 L960 260 L1180 320 L1400 270 L1400 520 L0 520 Z"
    fill="#111827"
    opacity="0.85"
  />
  <path
    d="M0 480 L200 340 L420 380 L640 340 L860 380 L1100 350 L1320 380 L1400 360 L1400 580 L0 580 Z"
    fill="#020617"
    opacity="0.9"
  />

  <!-- Road -->
  <path
    d="M620 800 C600 640 560 540 520 480 C460 392 380 340 280 320 C190 304 130 306 0 308 L0 800 Z"
    fill="url(#road)"
  />
  <path
    d="M780 800 C800 640 840 540 880 480 C940 392 1020 340 1120 320 C1210 304 1270 306 1400 308 L1400 800 Z"
    fill="url(#road)"
  />
  <g stroke="#e5e7eb" stroke-width="8" stroke-dasharray="30 24" stroke-linecap="round" opacity="0.9">
    <line x1="540" y1="520" x2="620" y2="800" />
    <line x1="860" y1="520" x2="780" y2="800" />
  </g>

  <!-- California icon (left) -->
  <g transform="translate(160, 260)">
    <rect x="-80" y="-40" width="160" height="120" rx="18" fill="#0b1120" />
    <rect x="-68" y="-28" width="136" height="96" rx="14" fill="#111827" />
    <rect x="-68" y="-28" width="80" height="6" rx="3" fill="#38bdf8" />
    <rect x="-52" y="4" width="60" height="10" rx="5" fill="#e5e7eb" />
    <rect x="-52" y="22" width="80" height="8" rx="4" fill="#9ca3af" />
    <rect x="-52" y="38" width="54" height="8" rx="4" fill="#6b7280" />
  </g>

  <!-- Las Vegas / 55+ icon (right) -->
  <g transform="translate(1240, 260)">
    <rect x="-80" y="-40" width="160" height="120" rx="18" fill="#0b1120" />
    <rect x="-68" y="-28" width="136" height="96" rx="14" fill="#111827" />
    <rect x="-68" y="-28" width="96" height="6" rx="3" fill="#22c55e" />
    <rect x="-52" y="4" width="72" height="10" rx="5" fill="#e5e7eb" />
    <rect x="-52" y="22" width="92" height="8" rx="4" fill="#9ca3af" />
    <rect x="-52" y="38" width="66" height="8" rx="4" fill="#6b7280" />
    <circle cx="40" cy="-6" r="10" fill="#22c55e" />
  </g>

  <!-- 55+ home icon -->
  <g transform="translate(1040, 420)">
    <rect x="-80" y="-50" width="160" height="110" rx="16" fill="#0b1120" />
    <path d="M-80 -20 L0 -70 L80 -20 Z" fill="#1f2937" />
    <rect x="-50" y="-12" width="40" height="40" rx="6" fill="#22c55e" />
    <rect x="10" y="-12" width="40" height="40" rx="6" fill="#38bdf8" />
    <rect x="-50" y="30" width="100" height="10" rx="5" fill="#e5e7eb" />
  </g>
</svg>

