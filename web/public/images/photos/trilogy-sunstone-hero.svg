<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Stylized illustration of Trilogy Sunstone 55+ resort-style community</title>
  <desc id="desc">
    Abstract desert mountains with a modern clubhouse, pool, and walking paths to suggest a 55+ active adult
    community in northwest Las Vegas. Replace this placeholder with real Trilogy Sunstone photography when available.
  </desc>
  <defs>
    <linearGradient id="skyGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#334155" />
    </linearGradient>
    <linearGradient id="sunsetGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#facc15" />
    </linearGradient>
    <linearGradient id="desertGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#78350f" />
      <stop offset="50%" stop-color="#a16207" />
      <stop offset="100%" stop-color="#854d0e" />
    </linearGradient>
    <linearGradient id="poolGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#22d3ee" />
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="1600" height="900" fill="url(#skyGradient)" />

  <!-- Sun -->
  <circle cx="1250" cy="220" r="140" fill="url(#sunsetGradient)" opacity="0.9" />

  <!-- Distant mountains -->
  <path
    d="M0 520 L220 380 L420 420 L650 360 L920 410 L1180 360 L1400 380 L1600 340 L1600 900 L0 900 Z"
    fill="#1f2937"
    opacity="0.7"
  />
  <path
    d="M0 560 L260 420 L520 460 L800 400 L1040 440 L1320 410 L1600 430 L1600 900 L0 900 Z"
    fill="#111827"
    opacity="0.85"
  />

  <!-- Desert foreground -->
  <path
    d="M0 640 C320 620 420 640 620 660 C840 680 1060 690 1320 680 C1460 674 1550 672 1600 674 L1600 900 L0 900 Z"
    fill="url(#desertGradient)"
  />

  <!-- Walking paths -->
  <path
    d="M220 900 C380 760 520 720 680 700 C860 676 1000 670 1160 640 C1280 618 1400 590 1600 560"
    fill="none"
    stroke="#c4b5fd"
    stroke-width="18"
    stroke-linecap="round"
    opacity="0.4"
  />
  <path
    d="M80 900 C260 820 420 790 580 770 C760 748 940 740 1120 720 C1320 700 1440 680 1600 660"
    fill="none"
    stroke="#fef9c3"
    stroke-width="10"
    stroke-linecap="round"
    opacity="0.3"
  />

  <!-- Clubhouse base -->
  <g transform="translate(520, 420)">
    <rect x="0" y="120" width="520" height="190" rx="18" fill="#0b1120" opacity="0.88" />
    <rect x="40" y="60" width="440" height="120" rx="16" fill="#111827" />
    <rect x="220" y="20" width="120" height="70" rx="12" fill="#020617" />

    <!-- Windows -->
    <g fill="#e5e7eb">
      <rect x="70" y="80" width="80" height="72" rx="6" opacity="0.9" />
      <rect x="190" y="80" width="80" height="72" rx="6" opacity="0.85" />
      <rect x="310" y="80" width="80" height="72" rx="6" opacity="0.9" />
    </g>

    <!-- Door -->
    <rect x="250" y="148" width="60" height="90" rx="6" fill="#0f172a" />
    <circle cx="303" cy="192" r="4" fill="#e5e7eb" />

    <!-- Accent lines -->
    <rect x="40" y="60" width="440" height="6" fill="#22c55e" opacity="0.9" />
    <rect x="40" y="124" width="440" height="2" fill="#e5e7eb" opacity="0.4" />
  </g>

  <!-- Pool -->
  <ellipse cx="880" cy="720" rx="260" ry="90" fill="url(#poolGradient)" opacity="0.9" />
  <ellipse
    cx="880"
    cy="720"
    rx="248"
    ry="82"
    fill="none"
    stroke="#e0f2fe"
    stroke-width="6"
    opacity="0.8"
  />
  <path
    d="M690 720 C740 700 780 694 830 692 C900 690 960 696 1030 712"
    fill="none"
    stroke="#f0f9ff"
    stroke-width="4"
    opacity="0.7"
  />

  <!-- Pool loungers -->
  <g fill="#f97316" opacity="0.9">
    <rect x="710" y="640" width="40" height="12" rx="3" />
    <rect x="740" y="652" width="40" height="12" rx="3" />
    <rect x="1010" y="640" width="40" height="12" rx="3" />
    <rect x="980" y="652" width="40" height="12" rx="3" />
  </g>

  <!-- Palm trees -->
  <g transform="translate(420, 460)">
    <rect x="0" y="0" width="14" height="140" rx="6" fill="#4b5563" />
    <g fill="#22c55e">
      <path d="M7 0 C-30 -20 -60 -40 -80 -70 C-40 -66 -10 -60 7 -50 Z" />
      <path d="M7 0 C40 -20 70 -40 90 -70 C50 -60 25 -52 7 -44 Z" />
      <path d="M7 0 C-10 -30 -20 -60 -24 -90 C-4 -64 6 -40 12 -20 Z" />
      <path d="M7 0 C18 -30 30 -60 40 -88 C26 -60 16 -38 10 -18 Z" />
    </g>
  </g>
  <g transform="translate(1180, 460)">
    <rect x="0" y="0" width="14" height="140" rx="6" fill="#4b5563" />
    <g fill="#22c55e">
      <path d="M7 0 C-30 -20 -60 -40 -80 -70 C-40 -66 -10 -60 7 -50 Z" />
      <path d="M7 0 C40 -20 70 -40 90 -70 C50 -60 25 -52 7 -44 Z" />
      <path d="M7 0 C-10 -30 -20 -60 -24 -90 C-4 -64 6 -40 12 -20 Z" />
      <path d="M7 0 C18 -30 30 -60 40 -88 C26 -60 16 -38 10 -18 Z" />
    </g>
  </g>

  <!-- Subtle residents silhouettes -->
  <g transform="translate(760, 640)" fill="#020617" opacity="0.75">
    <circle cx="0" cy="-26" r="12" />
    <rect x="-10" y="-16" width="20" height="40" rx="8" />
    <circle cx="52" cy="-26" r="11" />
    <rect x="44" y="-16" width="18" height="38" rx="7" />
  </g>
</svg>

